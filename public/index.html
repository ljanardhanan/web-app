<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Bus Tracker — Select Role</title>
	<style>
		body { font-family: system-ui, Arial, sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; background:#f7fafc; }
		.card { background:white; padding:2rem; border-radius:8px; box-shadow:0 6px 18px rgba(0,0,0,0.08); text-align:center; }
		.buttons { display:flex; gap:1rem; margin-top:1rem; justify-content:center; }
		.btn { padding:0.75rem 1.25rem; border-radius:6px; border:0; cursor:pointer; font-size:1rem; }
		.btn.primary { background:#2563eb; color:white; }
		.btn.secondary { background:#e5e7eb; color:#111827; }
		a { text-decoration: none; }
	</style>
</head>
<body>
	<main class="card" role="main" aria-labelledby="title">
		<h1 id="title">Who are you?</h1>
		<p>Select your role to continue:</p>
		<div class="buttons">
			<a href="parent.html"><button class="btn secondary">Parent</button></a>
			<a href="driver.html"><button class="btn primary">Driver</button></a>
		</div>
	</main>
</body>
</html>
